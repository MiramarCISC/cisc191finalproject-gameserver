spring.application.name=game-server
game.grpc.port=50051

# File-based H2 database. The data folder is gitignored.
spring.datasource.url=jdbc:h2:file:./data/game-server-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create/update tables automatically for this teaching lab.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Optional H2 console if students want to inspect the database.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
