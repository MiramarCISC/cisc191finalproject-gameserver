<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1v1 Match gRPC Web Client</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="container">
    <section class="card">
        <h1>Spring Web Client + gRPC 1v1 Match</h1>
        <p class="subtitle">
            Browser UI → Spring Boot web client → gRPC → Spring Boot server → JPA/H2
        </p>

        <div class="grid">
            <label>
                Player Name
                <input id="playerNameInput" type="text" placeholder="Enter player name">
            </label>

            <label>
                Difficulty
                <select id="difficultySelect">
                    <option>Easy</option>
                    <option selected>Normal</option>
                    <option>Hard</option>
                </select>
            </label>

            <label class="checkbox-row">
                <input id="rankedCheckbox" type="checkbox">
                Ranked Match
            </label>
        </div>

        <div class="actions">
            <button id="joinButton">Join Match</button>
            <button id="playButton">Play Match</button>
            <button id="historyButton">Load Match History</button>
            <button id="resetButton" class="secondary">Reset Local View</button>
        </div>
    </section>

    <section class="card">
        <h2>Match Status</h2>

        <div class="status-grid">
            <p><strong>Match ID:</strong> <span id="matchId">None</span></p>
            <p><strong>Player:</strong> <span id="playerName">Player</span></p>
            <p><strong>Opponent:</strong> <span id="opponentName">Opponent</span></p>
            <p><strong>Winner:</strong> <span id="winnerName">TBD</span></p>
        </div>

        <h2>Match Log</h2>
        <pre id="log"></pre>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
